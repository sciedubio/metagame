<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타인지 프로젝트 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 저장 중 스피너 */
        .spinner { border: 3px solid rgba(59,130,246,0.3); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 유튜브 스타일 상단 로딩바 */
        .top-loader { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(to right, #3b82f6, #8b5cf6, #3b82f6); background-size: 200% 100%; animation: moveGradient 1.5s linear infinite; z-index: 9999; }
        @keyframes moveGradient { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ⚙️ 필수 설정 상수
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi4mYhqnLqSKL38ZyUl8wCt9tJA5hh8AjRkQbYEK1D_DqIq8LJonIcAmt-lB_WFGEc/exec";

        // ==========================================
        // 🧩 아이콘 (SVG)
        // ==========================================
        const Icons = {
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            Folder: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
        };

        // ==========================================
        // 🌐 메인 앱 컴포넌트
        // ==========================================
        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [modal, setModal] = useState({ isOpen: false, title: '', message: '' });
            
            // 🚀 최적화 포인트: 로딩 상태를 '가져오는 중(fetching)'과 '저장 중(saving)'으로 분리
            const [isFetching, setIsFetching] = useState(false); 
            const [isSaving, setIsSaving] = useState(false);

            const showAlert = (title, message) => setModal({ isOpen: true, title, message });
            const closeAlert = () => setModal({ ...modal, isOpen: false });

            // API 통신 함수 (isSaveMode가 true면 화면 전체를 막고, false면 상단 얇은 바만 보여줌)
            const submitData = async (action, payload = {}, isSaveMode = false) => {
                if(isSaveMode) setIsSaving(true);
                else setIsFetching(true);

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, ...payload })
                    });
                    const result = await response.json();
                    
                    if(isSaveMode) setIsSaving(false);
                    else setIsFetching(false);
                    
                    return result;
                } catch (error) {
                    setIsSaving(false);
                    setIsFetching(false);
                    showAlert('통신 오류', '서버 지연 또는 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                    return { success: false };
                }
            };

            const handleLogin = async (loginData) => {
                const res = await submitData('login', loginData, true); // 로그인은 멈춤 화면(SaveMode) 사용
                if (res.success) {
                    setUser({ ...loginData, ...res });
                    setView(res.isAdmin ? 'admin' : 'student');
                } else {
                    showAlert('로그인 실패', res.message || '정보를 다시 확인해주세요.');
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800">
                    {/* 상단 얇은 로딩바 (목록 등을 불러올 때만 등장) */}
                    {isFetching && <div className="top-loader"></div>}

                    <header className="bg-white border-b px-4 py-3 shadow-sm flex justify-between items-center sticky top-0 z-30">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg"><Icons.Folder /></div>
                            <h1 className="text-xl font-bold">메타인지 게임</h1>
                        </div>
                        {user && (
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium">{user.isAdmin ? '11반 관리자 모드' : `${user.classNum}반 ${user.num}번 ${user.name}`}</span>
                                <button onClick={() => { setUser(null); setView('login'); }} className="flex items-center gap-1 text-sm text-slate-500 hover:text-rose-600"><Icons.LogOut /> 로그아웃</button>
                            </div>
                        )}
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 pb-24">
                        {view === 'login' && <LoginView onLogin={handleLogin} isSaving={isSaving} />}
                        {view === 'admin' && <AdminView submitData={submitData} showAlert={showAlert} isFetching={isFetching} />}
                        {view === 'student' && <StudentView user={user} submitData={submitData} showAlert={showAlert} isFetching={isFetching} />}
                    </main>

                    {/* 전체 화면 블로킹 로딩 (데이터 저장, 제출, 채점 등 중요한 순간에만 등장) */}
                    {isSaving && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
                            <div className="bg-white p-8 rounded-2xl shadow-xl flex flex-col items-center animate-in zoom-in-95">
                                <div className="spinner mb-4"></div>
                                <p className="text-slate-700 font-bold">서버에 저장 중입니다...</p>
                                <p className="text-slate-400 text-sm mt-2">창을 닫거나 새로고침하지 마세요.</p>
                            </div>
                        </div>
                    )}

                    {modal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-in zoom-in-95">
                                <h3 className="text-lg font-bold mb-2">{modal.title}</h3>
                                <p className="text-slate-600 mb-6 leading-relaxed">{modal.message}</p>
                                <button onClick={closeAlert} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl">확인</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LoginView = ({ onLogin, isSaving }) => {
            const [form, setForm] = useState({ classNum: '', num: '', name: '', password: '' });
            return (
                <div className="max-w-md mx-auto mt-10">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><Icons.User /></div>
                            <h2 className="text-2xl font-bold">로그인</h2>
                            <p className="text-slate-500 text-sm mt-2">관리자는 11반으로 로그인하세요.</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); onLogin(form); }} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-sm mb-1">반</label><input required type="number" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500" value={form.classNum} onChange={e => setForm({...form, classNum: e.target.value})} placeholder="예: 1" /></div>
                                <div><label className="block text-sm mb-1">번호</label><input required type="number" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500" value={form.num} onChange={e => setForm({...form, num: e.target.value})} placeholder="예: 15" /></div>
                            </div>
                            <div><label className="block text-sm mb-1">이름</label><input required type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="홍길동" /></div>
                            <div><label className="block text-sm mb-1">비밀번호</label><input required type="password" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500" value={form.password} onChange={e => setForm({...form, password: e.target.value})} placeholder="••••" /></div>
                            <button type="submit" disabled={isSaving} className={`w-full text-white font-bold py-3.5 rounded-xl mt-4 transition-colors ${isSaving ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                {isSaving ? '접속 확인 중...' : '접속하기'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const AdminView = ({ submitData, showAlert, isFetching }) => {
            const [projects, setProjects] = useState([]);
            const [selectedProj, setSelectedProj] = useState(null);
            const [newProj, setNewProj] = useState({ targetClass: '', name: '', totalRounds: 3, nSize: 5 });

            const loadProjects = async () => {
                const res = await submitData('getProjectList', {}, false); // false = 답답한 화면 멈춤 없음
                if(res.success) setProjects(res.data || []);
            };

            useEffect(() => { loadProjects(); }, []);

            const handleCreate = async () => {
                if(!newProj.targetClass || !newProj.name) return showAlert('경고', '모든 항목을 입력하세요.');
                const res = await submitData('createProject', newProj, true); // true = 저장중 블로킹
                if(res.success) { showAlert('성공', '생성 완료!'); loadProjects(); }
            };

            const handleStatusChange = async (action, successMsg) => {
                const res = await submitData(action, { id: selectedProj.id, rowIdx: selectedProj.rowIdx }, true);
                if(res.success) { showAlert('성공', successMsg); loadProjects(); setSelectedProj(null); }
            };

            return (
                <div className="flex flex-col md:flex-row gap-6">
                    <div className="w-full md:w-72 space-y-4">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border">
                            <h3 className="font-bold mb-4">새 프로젝트 생성</h3>
                            <input type="number" placeholder="대상 반" className="w-full p-2 border rounded-lg mb-2 text-sm" value={newProj.targetClass} onChange={e=>setNewProj({...newProj, targetClass: e.target.value})} />
                            <input type="text" placeholder="프로젝트명" className="w-full p-2 border rounded-lg mb-2 text-sm" value={newProj.name} onChange={e=>setNewProj({...newProj, name: e.target.value})} />
                            <div className="flex gap-2 mb-2">
                                <input type="number" placeholder="총라운드" className="w-full p-2 border rounded-lg text-sm" value={newProj.totalRounds} onChange={e=>setNewProj({...newProj, totalRounds: e.target.value})} />
                                <input type="number" placeholder="배정인원" className="w-full p-2 border rounded-lg text-sm" value={newProj.nSize} onChange={e=>setNewProj({...newProj, nSize: e.target.value})} />
                            </div>
                            <button onClick={handleCreate} className="w-full bg-blue-50 text-blue-600 font-bold py-2 rounded-lg hover:bg-blue-100 transition-colors">생성하기</button>
                        </div>
                        <div className="bg-white p-5 rounded-2xl shadow-sm border">
                            <h3 className="font-bold mb-4 flex justify-between items-center">
                                프로젝트 목록 
                                <button onClick={loadProjects} disabled={isFetching} className={`text-xs ${isFetching ? 'text-slate-400' : 'text-blue-500 hover:text-blue-700'}`}>
                                    {isFetching ? '로딩중...' : '새로고침'}
                                </button>
                            </h3>
                            <div className="space-y-2">
                                {projects.length === 0 && !isFetching && <p className="text-sm text-slate-400">생성된 프로젝트가 없습니다.</p>}
                                {projects.map(p => (
                                    <div key={p.id} onClick={() => setSelectedProj(p)} className={`p-3 rounded-xl border cursor-pointer transition-colors ${selectedProj?.id === p.id ? 'bg-blue-50 border-blue-400' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                        <div className="flex justify-between"><strong className="text-sm">{p.name}</strong><span className="text-xs text-blue-600 font-bold">{p.status}</span></div>
                                        <p className="text-xs text-slate-500 mt-1">{p.targetClass}반 | {p.currentRound}/{p.totalRounds}R</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 bg-white p-8 rounded-3xl shadow-sm border min-h-[500px]">
                        {!selectedProj ? (
                            <div className="flex flex-col items-center justify-center h-full text-slate-400 opacity-70 pt-20">
                                <Icons.Folder />
                                <p className="mt-4">좌측에서 프로젝트를 선택하세요.</p>
                            </div>
                        ) : (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                                <h2 className="text-2xl font-bold mb-6">{selectedProj.name}</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-8">
                                    <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs text-slate-500">대상</p><p className="font-bold">{selectedProj.targetClass}반</p></div>
                                    <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs text-slate-500">라운드</p><p className="font-bold">{selectedProj.currentRound}/{selectedProj.totalRounds}</p></div>
                                    <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs text-slate-500">인원</p><p className="font-bold">{selectedProj.nSize}명</p></div>
                                    <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs text-slate-500">상태</p><p className="font-bold text-blue-600">{selectedProj.status}</p></div>
                                </div>
                                <div className="space-y-4 max-w-sm mx-auto">
                                    <button onClick={() => handleStatusChange('adminAssign', '랜덤 배정이 완료되었습니다.')} className={`w-full py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 ${selectedProj.status === '출제중' ? 'bg-blue-600 text-white shadow-md hover:bg-blue-700' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>1. 문제 랜덤 배정 실행</button>
                                    <button onClick={() => handleStatusChange('adminFinalize', '채점 완료 및 라운드가 종료되었습니다.')} className={`w-full py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 ${selectedProj.status === '풀이중' ? 'bg-emerald-600 text-white shadow-md hover:bg-emerald-700' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>2. 라운드 채점 및 종료</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const StudentView = ({ user, submitData, showAlert, isFetching }) => {
            const [projects, setProjects] = useState([]);
            const [stView, setStView] = useState('list');
            const [activeProj, setActiveProj] = useState(null);
            const [quizData, setQuizData] = useState([]);

            const loadProjects = async () => {
                const res = await submitData('getStudentProjects', { classNum: user.classNum }, false);
                if(res.success) setProjects(res.data || []);
            };

            useEffect(() => { loadProjects(); }, []);

            const enterProject = async (p) => {
                setActiveProj(p);
                // 진행률 등을 확인할 때는 상단 얇은 바(false)만 표시하여 즉각적인 클릭감을 제공
                const stat = await submitData('checkSubmissionStatus', { classNum: user.classNum, num: user.num, name: user.name, projId: p.id, currentRound: p.currentRound }, false);
                
                if(p.status === '출제중') {
                    if(stat.data.q) setStView('wait'); else setStView('create');
                } else if(p.status === '풀이중') {
                    if(stat.data.a) setStView('wait');
                    else {
                        const qRes = await submitData('getMyQuiz', { classNum: user.classNum, num: user.num, projId: p.id }, false);
                        setQuizData(qRes.data || []);
                        setStView('solve');
                    }
                } else {
                    setStView('result');
                }
            };

            const goBackToList = () => {
                setStView('list');
                loadProjects(); // 목록으로 갈때 최신 데이터 갱신
            };

            return (
                <div className="flex flex-col md:flex-row gap-6">
                    <div className="w-full md:w-80 flex flex-col gap-4">
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-lg">
                            <h2 className="text-2xl font-bold mb-4">{user.classNum}반 {user.num}번 {user.name}</h2>
                            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-white/20 flex justify-between">
                                <div><p className="text-xs text-blue-200">메타 점수</p><p className="text-2xl font-black">{user.mScore}</p></div>
                                <div className="text-right"><p className="text-xs text-blue-200">인지 점수</p><p className="text-2xl font-black">{user.cScore}</p></div>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 bg-white rounded-3xl p-6 md:p-8 border shadow-sm min-h-[500px]">
                        {stView !== 'list' && (
                            <button onClick={goBackToList} className="mb-6 flex items-center text-sm font-bold text-slate-500 hover:text-blue-600 bg-slate-50 px-3 py-1.5 rounded-lg transition-colors">
                                <Icons.ChevronLeft /> 목록으로 돌아가기
                            </button>
                        )}
                        
                        {stView === 'list' && (
                            <div className="space-y-4 animate-in fade-in">
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2">내 프로젝트 목록 {isFetching && <span className="text-xs text-blue-500 font-normal animate-pulse">동기화 중...</span>}</h3>
                                {projects.length === 0 && !isFetching ? <p className="text-slate-400 pt-10 text-center">참여 가능한 프로젝트가 없습니다.</p> : projects.map(p => (
                                    <div key={p.id} onClick={() => enterProject(p)} className="p-5 rounded-2xl border border-slate-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer flex justify-between items-center transition-all group">
                                        <div>
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full mr-2 ${p.status==='출제중' ? 'bg-blue-100 text-blue-700' : p.status==='풀이중' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}`}>{p.status}</span>
                                            <strong className="text-lg text-slate-800">{p.name}</strong> <span className="text-sm text-slate-500 ml-2">({p.currentRound}R)</span>
                                        </div>
                                        <span className="text-blue-500 font-bold group-hover:translate-x-1 transition-transform">참여 &rarr;</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {stView === 'create' && <StudentCreateFlow user={user} activeProj={activeProj} submitData={submitData} setStView={setStView} showAlert={showAlert} />}
                        {stView === 'solve' && <StudentSolveFlow user={user} activeProj={activeProj} quizData={quizData} submitData={submitData} setStView={setStView} showAlert={showAlert} />}
                        
                        {stView === 'wait' && (
                            <div className="text-center py-20 animate-in fade-in slide-in-from-bottom-8">
                                <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner text-4xl">☕</div>
                                <h3 className="text-2xl font-bold mb-2">제출을 완료했습니다!</h3>
                                <p className="text-slate-500">선생님의 다음 지시(랜덤 배정 또는 정산)를 기다려주세요.</p>
                            </div>
                        )}

                        {stView === 'result' && (
                            <div className="text-center py-20 animate-in fade-in">
                                <div className="w-20 h-20 bg-slate-50 text-slate-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner text-4xl">🏁</div>
                                <h3 className="text-2xl font-bold mb-2">프로젝트가 종료되었습니다</h3>
                                <p className="text-slate-500">모든 라운드가 끝났습니다. 최종 획득 점수를 확인하세요.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const StudentCreateFlow = ({ user, activeProj, submitData, setStView, showAlert }) => {
            const [qForm, setQForm] = useState({ content: '', o1: '', o2: '', o3: '', o4: '', o5: '', answer: '1', predictCount: '' });

            const onSubmit = async () => {
                if(!qForm.content || !qForm.o1 || !qForm.predictCount) return showAlert('경고', '내용을 모두 채워주세요.');
                // 🚀 제출/저장 행위는 화면 전체를 막는 isSaveMode = true 적용
                const res = await submitData('submitQuestion', { classNum: user.classNum, num: user.num, name: user.name, projId: activeProj.id, q: qForm }, true);
                if(res.success) setStView('wait');
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <h2 className="text-2xl font-bold border-b pb-4">문제 출제하기 <span className="text-blue-600">({activeProj.currentRound}R)</span></h2>
                    <textarea rows="3" className="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 transition-all" placeholder="친구들이 헷갈려할 만한 문제를 만들어보세요!" value={qForm.content} onChange={e=>setQForm({...qForm, content: e.target.value})}></textarea>
                    
                    <div className="bg-slate-50 p-6 rounded-2xl border">
                        <label className="block text-sm font-bold text-slate-700 mb-4">보기 입력 및 정답(라디오버튼) 체크</label>
                        {[1,2,3,4,5].map(num => (
                            <div key={num} className="flex gap-3 mb-3 last:mb-0">
                                <input type="radio" name="answer" checked={qForm.answer === String(num)} onChange={() => setQForm({...qForm, answer: String(num)})} className="w-5 h-5 cursor-pointer mt-3 text-blue-600" />
                                <input type="text" placeholder={`보기 ${num} 내용`} className={`flex-1 p-3 border rounded-xl outline-none transition-colors ${qForm.answer === String(num) ? 'border-blue-400 bg-white ring-1 ring-blue-100' : 'bg-transparent'}`} value={qForm[`o${num}`]} onChange={e=>setQForm({...qForm, [`o${num}`]: e.target.value})} />
                            </div>
                        ))}
                    </div>

                    <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                        <label className="block text-sm font-bold text-indigo-900 mb-2">예상 정답자 수 예측하기</label>
                        <p className="text-xs text-indigo-600 mb-3">내 문제를 풀게 될 친구들({activeProj.nSize - 1}명) 중 몇 명이 맞출까요? 맞히면 메타점수 +1점!</p>
                        <input type="number" placeholder={`1 ~ ${activeProj.nSize-1}명`} className="w-full p-3 border rounded-xl outline-none focus:border-indigo-400" value={qForm.predictCount} onChange={e=>setQForm({...qForm, predictCount: e.target.value})} />
                    </div>

                    <button onClick={onSubmit} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-md transition-transform active:scale-95">내 문제 제출하기</button>
                </div>
            );
        };

        const StudentSolveFlow = ({ user, activeProj, quizData, submitData, setStView, showAlert }) => {
            const [answers, setAnswers] = useState({});
            const [metas, setMetas] = useState({});

            const onSubmit = async () => {
                if(Object.keys(answers).length < quizData.length || Object.keys(metas).length < quizData.length) return showAlert('경고', '모든 답과 확신도를 선택해주세요.');
                
                let qCreators = {};
                let correctAnswers = {};
                quizData.forEach((q, idx) => {
                    qCreators[idx] = { c: q[2], n: q[3] };
                    correctAnswers[idx] = q[11]; // q[11] is answer
                });

                // 🚀 제출/저장 행위는 화면 전체를 막는 isSaveMode = true 적용
                const res = await submitData('submitAnswers', { classNum: user.classNum, num: user.num, name: user.name, projId: activeProj.id, answers, metas, qCreators, correctAnswers }, true);
                if(res.success) setStView('wait');
            };

            if(quizData.length === 0) return <p className="text-center py-20 text-slate-500">이번 라운드에 배정된 문제가 없습니다.</p>;

            return (
                <div className="space-y-8 animate-in fade-in">
                    <h2 className="text-2xl font-bold border-b pb-4">문제 풀이 <span className="text-emerald-600">({activeProj.currentRound}R)</span></h2>
                    {quizData.map((q, idx) => (
                        <div key={idx} className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition-shadow">
                            <span className="text-xs font-bold text-slate-500 mb-3 bg-slate-100 px-3 py-1 rounded-full inline-block">출제자: {q[15] ? '익명' : q[4]}</span>
                            <h4 className="text-lg font-bold text-slate-800 mb-5 leading-relaxed">Q{idx+1}. {q[5]}</h4>
                            <div className="space-y-3 mb-6">
                                {[1,2,3,4,5].map(num => (
                                    <label key={num} className={`flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition-colors ${answers[idx] === String(num) ? 'border-blue-500 bg-blue-50 shadow-inner' : 'border-slate-100 hover:bg-slate-50'}`}>
                                        <input type="radio" name={`q_${idx}`} value={num} onChange={(e)=>setAnswers({...answers, [idx]: e.target.value})} className="w-5 h-5 text-blue-600" />
                                        <span className="text-sm font-medium text-slate-700">{q[5+num]}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="bg-indigo-50/80 p-4 rounded-2xl border border-indigo-100">
                                <label className="block text-sm font-bold text-indigo-900 mb-2">🤔 이 문제를 확실히 맞출 수 있나요?</label>
                                <select className="w-full bg-white border border-indigo-200 text-indigo-900 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-400" onChange={(e)=>setMetas({...metas, [idx]: e.target.value})} defaultValue="">
                                    <option value="" disabled>나의 확신도 선택하기</option>
                                    <option value="맞음">😎 네, 확실히 맞출 수 있습니다.</option>
                                    <option value="틀림">😅 아니요, 틀릴 것 같습니다.</option>
                                </select>
                            </div>
                        </div>
                    ))}
                    <button onClick={onSubmit} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-lg py-5 rounded-2xl shadow-lg transition-transform active:scale-95">모든 답안 제출하기</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
